<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paw Hut — Наші хвостики</title>
</head>

<body>

  <!-- Секція «Наші хвостики» -->
  <section class="pets-section">
    <div class="container">
      <h2 class="section-title">Наші хвостики</h2>
      <p class="section-subtitle">Вони дуже чекають на знайомство з вами</p>

      <!-- Блок елементів фільтрації (Категорії) -->
      <div class="categories-filter" id="categories-container">
        <button class="filter-btn active" data-category="all">Всі</button>
      </div>

      <!-- Список карток тварин -->
      <div class="pets-grid" id="pets-grid"></div>

      <!-- Пагінація -->
      <div class="pagination-container">
        <button id="load-more-btn" class="btn btn-load-more">Завантажити ще</button>
      </div>
    </div>
  </section>

  <!-- Модальне вікно детальної інформації -->
  <div class="modal-overlay" id="pet-modal">
    <div class="modal-content">
      <button class="modal-close-btn" id="modal-close" aria-label="Закрити модальне вікно">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
